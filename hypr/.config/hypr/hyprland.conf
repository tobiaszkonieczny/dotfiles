# Refer to the wiki for more information.
# https://wiki.hypr.land/
# Please note not all available settings / options are set here.
# For a full list, see the wiki

################
### MONITORS ###
################

monitor = eDP-1, 1920x1080@60, 0x288, 1
monitor = DP-2, 3440x1440@60, -760x-1152, 1
monitor = DP-1, 2560x1440@144, 1920x0, 1

###################
### MY PROGRAMS ###
###################
$terminal = foot
$fileManager = thunar
$menu = anyrun


#################
### AUTOSTART ###
#################
# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = waybar
exec-once = kdeconnect-indicator
exec-once = waypaper --restore
exec-once = swaync
exec-once = anyrun daemon
exec-once = awww-daemon
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = systemctl --user start hyprpolkitagent

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = HYPRCURSOR_THEME,rose-pine-hyprcursor

#####################
### LOOK AND FEEL ###
#####################

#PYWAL colors
source = ~/.cache/wal/colors-hyprland.conf
general {
    gaps_in = 5
    gaps_out = 5,20,20,20
    border_size = 3

    col.active_border = $color4 $color5 45deg
    col.inactive_border = $color0

    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 20
    rounding_power = 3
    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
    blur {
        enabled = true
        size = 5
        passes = 2
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes

    bezier = fluent_decel, 0.1, 1, 0, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = soft_bounce, 0.1, 1.1, 0.1, 1.05
    bezier = linear, 0, 0, 1, 1

    animation = global, 1, 4, fluent_decel
    animation = windows, 1, 4, fluent_decel, popin 75%
    animation = windowsIn, 1, 4, fluent_decel, popin 75%
    animation = windowsOut, 1, 3.5, fluent_decel, popin 75%
    animation = fadeIn, 1, 3, easeOutExpo
    animation = fadeOut, 1, 3, easeOutExpo
    animation = fade, 1, 4, easeOutExpo
    animation = border, 1, 5, default
    animation = borderangle, 1, 30, linear, loop
    animation = layers, 1, 4, fluent_decel, fade
    animation = layersIn, 1, 4, fluent_decel, fade
    animation = layersOut, 1, 2, fluent_decel, fade
    animation = workspaces, 1, 4.5, fluent_decel, slidefade 20%
    animation = workspacesIn, 1, 4.5, fluent_decel, slidefade 20%
    animation = workspacesOut, 1, 4.5, fluent_decel, slidefade 20%
    animation = specialWorkspace, 1, 4, fluent_decel, slidevert 5%
}


dwindle {
    preserve_split = true # You probably want this
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0 
    disable_hyprland_logo = true 
    animate_manual_resizes = true
}
group {
    col.border_active = $color4 $color5 45deg
    col.border_inactive = $color0

    groupbar {
        enabled = true
        font_size = 10
        height = 20
        stacked = false
        col.active = $color4
        col.inactive = $color0
        text_color = $color7
        render_titles = true
    }
}

#############
### INPUT ###
#############

input {
    kb_layout = pl
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    sensitivity = -0.6 
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

gesture = 3, horizontal, workspace

# Touchpad configuration for specific device, you can find the name of your device with 
# `hyprctl devices`

device {
    name = pnp0c50:00-06cb:cdaa-touchpad
    sensitivity = -0.1
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, Q, exec, $terminal
bind = $mainMod SHIFT, Q, exec, foot zsh -c "fastfetch; exec zsh"
bind = $mainMod, C, killactive,
bind = $mainMod SHIFT, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, W, exec, waypaper
bind = alt, SPACE, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, H, exec, hyprpicker -a
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, g, togglegroup,
bind = $mainMod SHIFT, G, moveoutofgroup,
bind = SUPER, N, exec, swaync-client -t -sw
bind = SUPER, X, exec, wlogout
bind = SUPER SHIFT, X, exec, hyprlock

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod SHIFT, right, resizeactive, 100 0
bind = $mainMod SHIFT, left, resizeactive, -100 0
bind = $mainMod SHIFT, up, resizeactive, 0 -100
bind = $mainMod SHIFT, down, resizeactive, 0 100


# Special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

#Screenshot with slurp and grim, copied to clipboard
bind = $mainMod SHIFT, P, exec, grim -g "$(slurp)" -t png - | wl-copy -t image/png

# Requires playerctl
# bindl = , $mainMod, SHIFT, F8, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


##############################
### WINDOWS AND WORKSPACES ###
##############################
layerrule {
    name = blur_ignore_alpha
    match:namespace = ^(anyrun|swaync-control-center|waybar)
    ignore_alpha = 0.1
    blur = on
}

layerrule{
    name = swaync
    match:namespace = ^(swaync-control-center|swaync-notification-window)
    animation = slidefade right
}
layerrule{
    name = blur
    match:namespace = ^(logout_dialog)
    blur = on
}
windowrule {
    name = opacity-general
    match:class = .*
    opacity = 0.9 0.9
}
windowrule {
    name = no-opacity
    match:class = ^(zen)$
    opacity = 1
}
windowrule {
    name = focus_on_activate
    match:class = ^(code-oss|zen|discord)$
    focus_on_activate = 1
}
windowrule{
    name = opacity-strong
    match:class = ^(foot|Caprine)$
    opacity = 0.85
}
windowrule{
    name = float
    match:class = ^(waypaper|blueman-manager|nm-connection-editor|org.pulseaudio.pavucontrol)$
    float = on
    size = 1200 800
}
